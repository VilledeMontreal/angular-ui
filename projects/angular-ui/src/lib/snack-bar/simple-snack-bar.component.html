<div
  class="bao-snackbar show"
  [ngClass]="toastClass"
  [attr.aria-live]="politeness"
  aria-atomic="true"
>
  <div class="bao-snackbar-icon">
    <bao-icon [svgIcon]="toastIcon" [title]="toastIconTitle"></bao-icon>
  </div>
  <div class="bao-snackbar-body">
    {{ data.message }}
  </div>
  <div class="bao-snackbar-action">
    @if (hasAction) {
      <div>
        <button
          bao-button
          role="button"
          type="utility"
          level="tertiary"
          [reversed]="true"
          [title]="data.actionLabelOrIcon"
          (click)="action()"
        >
          @if (isActionIcon) {
            <bao-icon
              [svgIcon]="data.actionLabelOrIcon"
              [title]="data.actionLabelOrIcon"
            ></bao-icon>
          } @else {
            <span>{{ data.actionLabelOrIcon }}</span>
          }
        </button>
      </div>
    }
    @if (data.showClose) {
      <div>
        <button
          bao-button
          role="button"
          type="utility"
          level="tertiary"
          [reversed]="true"
          title="{{ showCloseTitle }}"
          (click)="close()"
        >
          <bao-icon svgIcon="icon-x" title="{{ showCloseTitle }}"></bao-icon>
        </button>
      </div>
    }
  </div>
</div>
