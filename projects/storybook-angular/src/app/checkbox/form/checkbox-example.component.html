<section class="example-section">
  <bao-checkbox-group>
    <legend required="true" bao-label>
      Veuillez choisir vos animaux favoris
    </legend>

    <span class="example-list-section">
      <bao-checkbox
        [checked]="allComplete"
        [indeterminate]="someComplete()"
        id="exampleIDParent"
        (change)="setAll($event)"
      >
        {{ task.name }}
      </bao-checkbox>
    </span>
    <span class="example-list-section">
      <ul style="list-style-type: none; margin-bottom: 0">
        @for (subtask of task.subtasks; track subtask; let uniqueID = $index) {
          <li>
            <bao-checkbox
              [(ngModel)]="subtask.completed"
              [id]="uniqueID"
              [name]="subtask.name"
              (ngModelChange)="updateAllComplete()"
            >
              {{ subtask.name }}
            </bao-checkbox>
          </li>
        }
      </ul>
    </span>
    <bao-guiding-text
      >Vos animaux favoris indiqueront votre personalité</bao-guiding-text
    >
  </bao-checkbox-group>
</section>
<section class="mt-4">
  {{ task | json }}
</section>
